<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bientôt disponible 💗</title>
  <style>
    :root {
      --rose: #e9547a;
      --rose-fonce: #b01e4f; 
      --creme: #fff5f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--creme);
      color: var(--rose-fonce);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 100vh;
      padding: 24px;
    }
    .coeur {
      font-size: 72px;
      line-height: 1;
      animation: battement 1.4s ease-in-out infinite;
    }
    @keyframes battement {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.15); }
    }
    h1 {
      font-size: clamp(28px, 6vw, 48px);
      margin: 24px 0 12px;
      letter-spacing: 1px;
    }
    p {
      font-size: clamp(16px, 3vw, 20px);
      max-width: 480px;
      color: #a04;
      opacity: 0.85;
    }
    footer {
      margin-top: 40px;
      font-size: 13px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="coeur">💗</div>
  <h1>Bientôt disponible</h1>
  <p>Cette page arrive très vite. Reviens bientôt pour découvrir la surprise&nbsp;!</p>
  <footer>Fait avec ❤︎</footer>
</body>
</html>
